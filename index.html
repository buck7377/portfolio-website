*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --p:#c084fc;--pb:#e9d5ff;--pd:#7c3aed;--pg:rgba(192,132,252,0.4);
  --dim:#4a3a6a;--scr:rgba(2,1,8,0.88);
}
html,body{width:100%;height:100vh;overflow:hidden;background:#000;font-family:"Share Tech Mono",monospace;}
body::after{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:9999;}
.wrap{position:relative;width:100vw;height:100vh;}
.skin{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;z-index:1;}
.glow-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;mix-blend-mode:screen;}
.scr{
  position:absolute;
  background:var(--scr);
  overflow:hidden;
  border-radius:6px;
  z-index:3;
}
/* CRT scanlines */
.scr::before {
  content:"";
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.25) 2px,
    rgba(0,0,0,0.25) 4px
  );
  pointer-events:none;
  z-index:20;
}
/* CRT vignette + phosphor glow */
.scr::after {
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%),
    radial-gradient(ellipse at center, rgba(167,100,255,0.03) 0%, transparent 70%);
  pointer-events:none;
  z-index:21;
}
@keyframes flicker{
  0%{opacity:0.9;}7%{opacity:0.1;}14%{opacity:0.85;}20%{opacity:0.05;}
  27%{opacity:0.8;}40%{opacity:0.6;}50%{opacity:0.95;}65%{opacity:0.15;}
  75%{opacity:0.85;}85%{opacity:0.1;}100%{opacity:0.9;}
}
@keyframes vu{from{height:2px}to{height:var(--h,14px)}}
@keyframes eqa{from{height:var(--lo,12px)}to{height:var(--hi,45px)}}
.label{font-family:"Dynatron",monospace;font-size:11px;color:var(--dim);letter-spacing:2.5px;border-bottom:1px solid rgba(192,132,252,.15);padding-bottom:4px;margin-bottom:5px;}
.item{padding:5px 0;border-bottom:1px solid rgba(192,132,252,.06);cursor:pointer;transition:background .1s;}
.item:hover{background:rgba(192,132,252,.05);}
.item:hover .t{color:var(--pb);text-shadow:0 0 6px var(--pg);}
.t{font-family:"Dynatron",monospace;font-size:13px;color:var(--p);transition:color .1s;line-height:1.3;}
.m{font-size:8px;color:var(--dim);letter-spacing:1px;}
.tagline{font-family:"Dynatron",monospace;font-size:clamp(18px,2.5vw,34px);line-height:1.3;color:var(--pb);text-shadow:0 0 14px var(--pg);}
.sub{font-size:clamp(9px,1vw,12px);color:var(--dim);letter-spacing:1.5px;line-height:1.7;margin-top:8px;}
.clock{font-family:"Dynatron",monospace;font-size:clamp(28px,3.5vw,50px);color:var(--pb);text-shadow:0 0 16px var(--pg);letter-spacing:3px;line-height:1;}
.badge{font-family:"Dynatron",monospace;font-size:12px;color:var(--dim);border:1px solid var(--pd);padding:1px 6px;display:inline-block;margin:2px 2px 0 0;}
.badge b{color:var(--pb);font-weight:normal;}
.info-k{font-size:8px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.info-v{font-family:"Dynatron",monospace;font-size:13px;color:var(--pb);text-shadow:0 0 5px var(--pg);}
.vu{display:flex;align-items:flex-end;gap:2px;height:18px;margin-top:10px;}
.vb{width:4px;background:var(--p);box-shadow:0 0 4px var(--pg);animation:vu .12s ease-in-out infinite alternate;}
.eq-wrap{display:flex;flex-direction:column;justify-content:center;height:100%;padding:8px 12px;gap:5px;}
.eq-labels{display:flex;justify-content:space-between;font-size:7px;color:var(--dim);}
.eq-bars{display:flex;align-items:flex-end;gap:3px;height:60px;}
.eq-bar{flex:1;min-height:3px;background:var(--pd);box-shadow:0 0 3px var(--pg);animation:eqa .3s ease-in-out infinite alternate;}
.eq-freqs{display:flex;justify-content:space-between;font-size:6px;color:var(--dim);}
.lbtn{font-family:"Dynatron",monospace;font-size:13px;color:var(--dim);background:transparent;border:1px solid rgba(192,132,252,.2);cursor:pointer;padding:4px 10px;letter-spacing:2px;text-decoration:none;display:inline-block;transition:all .12s;}
.lbtn:hover{color:var(--pb);border-color:var(--pd);text-shadow:0 0 7px var(--pg);}
.bstat{display:flex;flex-direction:column;align-items:center;}
.bsv{font-family:"Dynatron",monospace;font-size:clamp(14px,1.8vw,22px);color:var(--pb);text-shadow:0 0 8px var(--pg);letter-spacing:2px;line-height:1;}
.bsk{font-size:7px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:2000;display:none;justify-content:center;align-items:center;}
.modal-bg.open{display:flex;}
.modal{background:#06031a;border:1px solid var(--pd);box-shadow:0 0 40px rgba(192,132,252,.2);padding:24px 28px;max-width:460px;width:90%;position:relative;}
.mc{position:absolute;top:8px;right:12px;font-family:"Dynatron",monospace;font-size:22px;color:var(--dim);background:none;border:none;cursor:pointer;}
.mc:hover{color:var(--pb);}
.mt{font-family:"Dynatron",monospace;font-size:20px;color:var(--pb);text-shadow:0 0 10px var(--pg);letter-spacing:2px;margin-bottom:4px;}
.mm{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(192,132,252,.15);}
.mb{font-size:11px;color:var(--dim);line-height:1.8;}
</style>

    <div class="mt" id="mt"></div>
    <div class="mm" id="mm"></div>
    <div class="mb" id="mb"></div>

<script>
const projects={
  arbor:{t:"ARBOR GREEN TREE SERVICE",m:"SEO CASE STUDY // GEORGIA",b:"Full-funnel content strategy driving organic lead growth across multiple states."},
  atl:{t:"ATL TREE WORK",m:"SEO CASE STUDY // ATLANTA, GA",b:"Ongoing blog content targeting competitive tree service keywords in the Atlanta metro."},
  susan:{t:"SUSAN GIDDINGS CONSULTING",m:"BLOG CONTENT // CONSTRUCTION COACHING",b:"Long-form blog posts written from video transcripts covering construction business growth."},
  kline:{t:"KLINE BROS LANDSCAPING",m:"WEB COPY // NJ",b:"SEO blog posts targeting pool fencing and landscaping keywords across northern New Jersey."},
  tristate:{t:"TRI-STATE TREE SERVICE",m:"SEO BLOG POSTS // NY/NJ/CT",b:"Multi-location SEO blog series covering tree removal, trimming, and emergency services."},
  eagerton:{t:"EAGERTON TREE SERVICE",m:"SEO BLOG POSTS // ALABAMA",b:"Targeted blog content for an Alabama tree service company."},
  georgia:{t:"GEORGIA TREE COMPANY",m:"SEO BLOG POSTS // GEORGIA",b:"Regular SEO blog content covering the full range of tree care services."},
  spartan:{t:"SPARTAN TREE SERVICE",m:"SEO BLOG POSTS // MICHIGAN",b:"Local SEO content for a Michigan tree service company."},
  premier:{t:"PREMIER TREE CARE",m:"SEO BLOG POSTS // TEXAS",b:"SEO blog posts targeting tree care keywords in the Texas market."},
  rpm:{t:"RPM SERVICES GROUP LLC",m:"AGENCY // MULTI-CLIENT",b:"High-volume content production for multiple local service business clients."},
  alchemists:{t:"THE ALCHEMISTS",m:"AGENCY // MULTI-CLIENT",b:"SEO blog content and web copy for a roster of local service business clients."},
  barone:{t:"BARONE'S TREE PROS",m:"WEB COPY // NJ",b:"Web copy and service page content for a New Jersey tree service company."},
  champions:{t:"CHAMPIONS TREE PRESERVATION",m:"WEB COPY // TEXAS",b:"Service page content and SEO posts for a Texas tree preservation company."},
  arbor2:{t:"ARBOR PLANT HEALTH CARE",m:"SEO CONTENT // MINNESOTA",b:"Blog and web content for a Minnesota arborist company."},
  forestscapes:{t:"FORESTSCAPES",m:"SEO CONTENT // COLORADO",b:"SEO blog posts for a Colorado tree service company."},
  greg:{t:"GREG SMITH TREE SERVICE",m:"SEO CONTENT // FLORIDA",b:"Targeted SEO content for a Florida tree service company."},
};
function modal(k){const p=projects[k];if(!p)return;document.getElementById("mt").textContent=p.t;document.getElementById("mm").textContent=p.m;document.getElementById("mb").textContent=p.b;document.getElementById("modal-bg").classList.add("open");}
function closeModal(e){if(e.target===document.getElementById("modal-bg"))document.getElementById("modal-bg").classList.remove("open");}
function tick(){const n=new Date();const el=document.getElementById("clock");if(el)el.textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,"0")).join(":");}
setInterval(tick,1000);tick();
const vuEl=document.getElementById("vu");
if(vuEl){for(let i=0;i<24;i++){const b=document.createElement("div");b.className="vb";b.style.setProperty("--h",(8+Math.floor(Math.random()*14))+"px");b.style.animationDuration=(0.09+Math.random()*0.12)+"s";b.style.animationDelay=(Math.random()*0.08)+"s";vuEl.appendChild(b);}}
const eqEl=document.getElementById("eq-bars");
if(eqEl){const eh=[28,42,22,55,36,50,30,58,24,40];for(let i=0;i<10;i++){const b=document.createElement("div");b.className="eq-bar";b.style.setProperty("--lo",Math.max(4,eh[i]-10)+"px");b.style.setProperty("--hi",eh[i]+"px");b.style.animationDuration=(0.22+Math.random()*0.28)+"s";b.style.animationDelay=(Math.random()*0.18)+"s";eqEl.appendChild(b);}}
</script>
